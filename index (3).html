<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚛 Водитель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: var(--tg-theme-bg-color, #1a1d24);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #2a2d36);
    --text: var(--tg-theme-text-color, #ffffff);
    --text-muted: var(--tg-theme-hint-color, #8d9099);
    --accent: var(--tg-theme-button-color, #f7b500);
    --accent-text: var(--tg-theme-button-text-color, #000000);
    --link: var(--tg-theme-link-color, #6ab2f2);
    --border: rgba(255,255,255,0.08);
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    color: #000;
    text-align: center;
  }
  .header-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header-sub { font-size: 13px; opacity: 0.85; }

  /* Sections */
  .section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* Cards */
  .card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .card-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .card-sub { color: var(--text-muted); font-size: 13px; }

  /* Stages */
  .stage {
    display: flex;
    align-items: flex-start;
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: 10px;
    margin-bottom: 8px;
    gap: 12px;
  }
  .stage-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .stage-icon.done { background: rgba(16,185,129,0.2); }
  .stage-icon.current { background: rgba(247,181,0,0.25); animation: pulse 2s ease-in-out infinite; }
  .stage-icon.pending { background: rgba(141,144,153,0.15); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,181,0,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(247,181,0,0); }
  }
  .stage-content { flex: 1; }
  .stage-route { font-weight: 600; font-size: 15px; }
  .stage-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .stage-done-time { color: var(--green); font-size: 11px; margin-top: 4px; }

  /* Action grid */
  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px;
  }
  .action-btn {
    background: var(--bg-secondary);
    border: none;
    color: var(--text);
    padding: 16px 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s;
    font-family: inherit;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-icon { font-size: 28px; }
  .action-label { font-weight: 600; }

  /* Advance status */
  .advance-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .advance-stat {
    padding: 10px 8px;
    background: var(--bg-secondary);
    border-radius: 8px;
    text-align: center;
  }
  .advance-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .advance-stat-value { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .advance-stat-value.green { color: var(--green); }
  .advance-stat-value.red { color: var(--red); }
  .advance-stat-value.accent { color: var(--accent); }

  /* Forms / Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: flex-end;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg);
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  /* Form */
  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
  }
  .field-textarea { min-height: 80px; resize: vertical; }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Buttons */
  .btn {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:active { opacity: 0.85; }
  .btn.secondary {
    background: var(--bg-secondary);
    color: var(--text);
  }
  .btn.danger {
    background: var(--red);
    color: #fff;
  }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  /* Category select */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .cat-item {
    background: var(--bg-secondary);
    border: 2px solid transparent;
    padding: 12px 6px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cat-item.active {
    border-color: var(--accent);
    background: rgba(247,181,0,0.15);
  }
  .cat-icon { font-size: 22px; }
  .cat-label { font-size: 11px; margin-top: 4px; font-weight: 600; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 14px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }

  /* Photo upload */
  .photo-preview {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .photo-item {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    border: 1px solid var(--border);
    position: relative;
  }
  .photo-remove {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--red);
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    border: none;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }

  /* SOS button */
  .sos-btn {
    background: linear-gradient(135deg, var(--red), #b91c1c);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    width: 100%;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    font-family: inherit;
  }

  /* Status bar */
  .driver-bar {
    background: var(--bg-secondary);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .driver-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
  }
  .driver-info { flex: 1; min-width: 0; }
  .driver-name { font-weight: 600; font-size: 14px; }
  .driver-trip { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Загрузка...</div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
// КОНФИГ
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbw64Hp8lajiCQ8CDcEEvIPfp3BVKYf4OPBFKTyEfiDnMLkU5Xy6uVy6I4216nkKkKE/exec';

// ============================================================
// TELEGRAM INIT
// ============================================================
const tg = window.Telegram?.WebApp;
let tgUser = null;
let driverData = null;
let currentTrip = null;
let advanceCategories = [];

if (tg) {
  tg.expand();
  tg.ready();
  tgUser = tg.initDataUnsafe?.user;

  // Тёмная тема Telegram
  tg.setHeaderColor('#1a1d24');
  tg.setBackgroundColor('#1a1d24');
}

// ============================================================
// API
// ============================================================
async function api(action, data = {}) {
  if (!API_URL) {
    showToast('API не настроен. Скажите администратору.', 'error');
    return { ok: false };
  }
  try {
    const params = new URLSearchParams({ action, ...data });
    const resp = await fetch(`${API_URL}?${params}`);
    const text = await resp.text();
    return JSON.parse(text);
  } catch (e) {
    showToast('Ошибка связи: ' + e.message, 'error');
    return { ok: false, error: e.message };
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
}

function formatMoney(amount) {
  return '$' + Math.round(amount).toLocaleString('ru-RU');
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ru-RU');
}

function formatDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  if (!tgUser) {
    showError('Это приложение работает только внутри Telegram. Откройте через бота @Driver_Parnas');
    return;
  }

  // Загружаем данные водителя по Telegram ID
  const resp = await api('getDriverByTelegram', { telegramId: tgUser.id });

  if (!resp.ok) {
    showError('Не удалось получить данные. Возможно, вы ещё не зарегистрированы. Отправьте /start боту @Driver_Parnas');
    return;
  }

  driverData = resp.driver;
  currentTrip = resp.currentTrip;
  advanceCategories = resp.advanceCategories || [];

  render();
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-text">${escapeHtml(msg)}</div>
    </div>
  `;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  if (!currentTrip) {
    renderNoTrip();
    return;
  }
  renderTrip();
}

function renderNoTrip() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="header-title">👋 Привет, ${escapeHtml(driverData.name)}!</div>
      <div class="header-sub">Сейчас активного рейса нет</div>
    </div>

    <div class="driver-bar">
      <div class="driver-avatar">${escapeHtml(driverData.name?.[0] || '?')}</div>
      <div class="driver-info">
        <div class="driver-name">${escapeHtml(driverData.name)}</div>
        <div class="driver-trip">${escapeHtml(driverData.phone || '')}</div>
      </div>
    </div>

    <div class="empty">
      <div class="empty-icon">🚛</div>
      <div class="empty-text">У вас нет активных рейсов.<br>Когда диспетчер назначит рейс — вы увидите его здесь.</div>
    </div>

    <div style="padding: 16px;">
      <button class="btn secondary" onclick="refreshApp()">🔄 Обновить</button>
    </div>
  `;
}

function renderTrip() {
  const trip = currentTrip;
  let stages = trip.stages;
  if (typeof stages === 'string') {
    try { stages = JSON.parse(stages); } catch (e) { stages = []; }
  }
  if (!Array.isArray(stages)) stages = [];

  // Считаем аванс
  const advance = trip.advance || {};
  let totalGiven = 0, totalSpent = 0;
  for (const cat of advanceCategories) {
    totalGiven += Number(advance[cat.key] || 0);
  }
  // Расходы по этому рейсу из state.finance — пока упростим, дашборд это посчитает
  totalSpent = Number(trip.advanceSpent || 0);

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="driver-bar">
      <div class="driver-avatar">${escapeHtml(driverData.name?.[0] || '?')}</div>
      <div class="driver-info">
        <div class="driver-name">${escapeHtml(driverData.name)}</div>
        <div class="driver-trip">Рейс ${escapeHtml(trip.number || '')}</div>
      </div>
      <button class="btn secondary" style="width: auto; padding: 8px 12px; font-size: 13px;" onclick="refreshApp()">🔄</button>
    </div>

    <div class="header">
      <div class="header-title">🚛 Мой рейс</div>
      <div class="header-sub">${escapeHtml(trip.cargo || 'Без груза')}</div>
    </div>

    <!-- Инфо о рейсе -->
    <div class="section">
      <div class="card">
        <div class="card-title">📋 ${escapeHtml(trip.number || '—')}</div>
        <div class="card-sub">
          🚛 Фура: ${escapeHtml(trip.truckPlate || '—')}<br>
          🚚 Прицеп: ${escapeHtml(trip.trailerPlate || '—')}<br>
          🏢 Клиент: ${escapeHtml(trip.clientName || '—')}<br>
          📅 Выезд: ${formatDate(trip.date)}
        </div>
      </div>
    </div>

    <!-- Этапы -->
    <div class="section">
      <div class="section-title">📍 Этапы маршрута</div>
      ${stages.map((s, i) => renderStage(s, i, stages)).join('') || '<div class="empty-text" style="text-align:center;">Этапов пока нет</div>'}
    </div>

    <!-- Аванс -->
    ${trip.advanceGiven ? `
      <div class="section">
        <div class="section-title">💵 Аванс на рейс</div>
        <div class="advance-stats">
          <div class="advance-stat">
            <div class="advance-stat-label">Выдано</div>
            <div class="advance-stat-value accent">${formatMoney(totalGiven)}</div>
          </div>
          <div class="advance-stat">
            <div class="advance-stat-label">Потрачено</div>
            <div class="advance-stat-value red">${formatMoney(totalSpent)}</div>
          </div>
          <div class="advance-stat">
            <div class="advance-stat-label">Остаток</div>
            <div class="advance-stat-value green">${formatMoney(totalGiven - totalSpent)}</div>
          </div>
        </div>
      </div>
    ` : ''}

    <!-- Действия -->
    <div class="actions-grid">
      <button class="action-btn" onclick="openArrivalModal()">
        <span class="action-icon">📍</span>
        <span class="action-label">Отметить прибытие</span>
      </button>
      <button class="action-btn" onclick="openFuelModal()">
        <span class="action-icon">⛽</span>
        <span class="action-label">Заправка</span>
      </button>
      <button class="action-btn" onclick="openExpenseModal()">
        <span class="action-icon">💸</span>
        <span class="action-label">Добавить расход</span>
      </button>
      <button class="action-btn" onclick="openPhotoModal()">
        <span class="action-icon">📸</span>
        <span class="action-label">Фото документа</span>
      </button>
    </div>

    <div class="section">
      <button class="sos-btn" onclick="sendSOS()">🆘 SOS — нужна помощь!</button>
    </div>
  `;
}

function renderStage(s, i, allStages) {
  let status = 'pending';
  let icon = (i + 1).toString();
  let timeInfo = '';

  if (s.arrivedAt) {
    status = 'done';
    icon = '✓';
    timeInfo = `<div class="stage-done-time">✅ Прибыл ${formatDateTime(s.arrivedAt)}</div>`;
  } else {
    // Текущий = первый без arrivedAt
    const firstPending = allStages.findIndex(x => !x.arrivedAt);
    if (i === firstPending) {
      status = 'current';
      icon = '→';
    }
  }

  return `
    <div class="stage">
      <div class="stage-icon ${status}">${icon}</div>
      <div class="stage-content">
        <div class="stage-route">${escapeHtml(s.route || 'Маршрут не указан')}</div>
        <div class="stage-meta">
          ${s.cargo ? '📦 ' + escapeHtml(s.cargo) : ''}
          ${s.distance ? ' • ' + s.distance + ' км' : ''}
        </div>
        ${timeInfo}
      </div>
    </div>
  `;
}

// ============================================================
// ACTIONS — Отметить прибытие
// ============================================================
function openArrivalModal() {
  let stages = currentTrip.stages;
  if (typeof stages === 'string') {
    try { stages = JSON.parse(stages); } catch (e) { stages = []; }
  }
  if (!Array.isArray(stages)) stages = [];

  const pending = stages.findIndex(x => !x.arrivedAt);
  if (pending === -1) {
    showToast('Все этапы уже отмечены', 'success');
    return;
  }

  const stage = stages[pending];
  showModal(`
    <div class="modal-title">📍 Отметить прибытие</div>
    <div class="card">
      <div class="card-title">Этап ${pending + 1}: ${escapeHtml(stage.route || '—')}</div>
      <div class="card-sub">Подтвердите прибытие в конечную точку этого этапа</div>
    </div>
    <div class="btn-row">
      <button class="btn secondary" onclick="closeModal()">Отмена</button>
      <button class="btn" onclick="confirmArrival(${pending})">✅ Прибыл</button>
    </div>
  `);
}

async function confirmArrival(stageIndex) {
  closeModal();
  const resp = await api('markStageArrival', {
    tripId: currentTrip.id,
    stageIndex,
    arrivedAt: new Date().toISOString()
  });
  if (resp.ok) {
    showToast('✅ Прибытие отмечено', 'success');
    await refreshApp();
  } else {
    showToast('Ошибка: ' + (resp.error || 'неизвестно'), 'error');
  }
}

// ============================================================
// ACTIONS — Заправка
// ============================================================
function openFuelModal() {
  showModal(`
    <div class="modal-title">⛽ Заправка</div>
    <div class="field">
      <label class="field-label">АЗС</label>
      <input class="field-input" id="fuel-station" placeholder="Например: Лукойл №5">
    </div>
    <div class="field">
      <label class="field-label">Литров</label>
      <input class="field-input" id="fuel-litres" type="number" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label class="field-label">Сумма ($)</label>
      <input class="field-input" id="fuel-amount" type="number" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label class="field-label">Комментарий (необязательно)</label>
      <input class="field-input" id="fuel-note" placeholder="Например: Без чека">
    </div>
    <div class="btn-row">
      <button class="btn secondary" onclick="closeModal()">Отмена</button>
      <button class="btn" onclick="submitFuel()">💾 Сохранить</button>
    </div>
  `);
}

async function submitFuel() {
  const station = document.getElementById('fuel-station').value.trim();
  const litres = parseFloat(document.getElementById('fuel-litres').value) || 0;
  const amount = parseFloat(document.getElementById('fuel-amount').value) || 0;
  const note = document.getElementById('fuel-note').value.trim();

  if (!amount) { showToast('Укажите сумму', 'error'); return; }

  closeModal();
  const resp = await api('addDriverFuel', {
    tripId: currentTrip.id,
    driverId: driverData.id,
    station, litres, amount, note,
    date: new Date().toISOString()
  });
  if (resp.ok) {
    showToast('✅ Заправка добавлена', 'success');
    await refreshApp();
  } else {
    showToast('Ошибка: ' + (resp.error || 'неизвестно'), 'error');
  }
}

// ============================================================
// ACTIONS — Расход
// ============================================================
let selectedCategory = null;

function openExpenseModal() {
  selectedCategory = null;
  const catGrid = advanceCategories.map(c => `
    <div class="cat-item" onclick="selectCategory('${c.key}', this)">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-label">${escapeHtml(c.label)}</div>
    </div>
  `).join('');

  showModal(`
    <div class="modal-title">💸 Расход</div>
    <div class="field-label">Категория (из аванса)</div>
    <div class="cat-grid">${catGrid}</div>
    <div class="field">
      <label class="field-label">Сумма ($)</label>
      <input class="field-input" id="expense-amount" type="number" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label class="field-label">Комментарий</label>
      <input class="field-input" id="expense-note" placeholder="На что потратили">
    </div>
    <div class="btn-row">
      <button class="btn secondary" onclick="closeModal()">Отмена</button>
      <button class="btn" onclick="submitExpense()">💾 Сохранить</button>
    </div>
  `);
}

function selectCategory(key, el) {
  selectedCategory = key;
  document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

async function submitExpense() {
  const amount = parseFloat(document.getElementById('expense-amount').value) || 0;
  const note = document.getElementById('expense-note').value.trim();

  if (!amount) { showToast('Укажите сумму', 'error'); return; }
  if (!selectedCategory) { showToast('Выберите категорию', 'error'); return; }

  closeModal();
  const resp = await api('addDriverExpense', {
    tripId: currentTrip.id,
    driverId: driverData.id,
    category: selectedCategory,
    amount, note,
    date: new Date().toISOString()
  });
  if (resp.ok) {
    showToast('✅ Расход добавлен', 'success');
    await refreshApp();
  } else {
    showToast('Ошибка: ' + (resp.error || 'неизвестно'), 'error');
  }
}

// ============================================================
// ACTIONS — Фото
// ============================================================
function openPhotoModal() {
  showModal(`
    <div class="modal-title">📸 Загрузить фото</div>
    <div class="field">
      <label class="field-label">Тип документа</label>
      <select class="field-select" id="photo-type">
        <option value="CMR">CMR (накладная)</option>
        <option value="Чек">Чек заправки/расхода</option>
        <option value="Документ">Документ ТС</option>
        <option value="Другое">Другое</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Выберите фото</label>
      <input type="file" class="field-input" id="photo-file" accept="image/*" capture="environment">
    </div>
    <div class="field">
      <label class="field-label">Комментарий</label>
      <input class="field-input" id="photo-note" placeholder="Описание (необязательно)">
    </div>
    <div class="btn-row">
      <button class="btn secondary" onclick="closeModal()">Отмена</button>
      <button class="btn" onclick="submitPhoto()">📤 Загрузить</button>
    </div>
  `);
}

async function submitPhoto() {
  const file = document.getElementById('photo-file').files[0];
  const type = document.getElementById('photo-type').value;
  const note = document.getElementById('photo-note').value.trim();

  if (!file) { showToast('Выберите фото', 'error'); return; }

  showToast('Загружаем...');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const resp = await api('addDriverPhoto', {
      tripId: currentTrip.id,
      driverId: driverData.id,
      type, note,
      fileName: file.name,
      mimeType: file.type,
      base64
    });
    if (resp.ok) {
      closeModal();
      showToast('✅ Фото загружено', 'success');
      await refreshApp();
    } else {
      showToast('Ошибка: ' + (resp.error || 'неизвестно'), 'error');
    }
  };
  reader.readAsDataURL(file);
}

// ============================================================
// SOS
// ============================================================
function sendSOS() {
  const msg = prompt('Опишите проблему кратко:');
  if (!msg) return;

  api('sendSOS', {
    tripId: currentTrip.id,
    driverId: driverData.id,
    message: msg,
    date: new Date().toISOString()
  }).then(resp => {
    if (resp.ok) {
      showToast('🆘 Сообщение отправлено диспетчеру', 'success');
    } else {
      showToast('Ошибка отправки SOS', 'error');
    }
  });
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html) {
  let overlay = document.getElementById('modal-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.classList.add('active');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.classList.remove('active');
}

// ============================================================
// REFRESH
// ============================================================
async function refreshApp() {
  document.getElementById('app').innerHTML = `
    <div class="loading"><div class="spinner"></div><div>Обновляем...</div></div>
  `;
  await init();
}

// ============================================================
// START
// ============================================================
init();
</script>

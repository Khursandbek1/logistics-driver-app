<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚛 Водитель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: var(--tg-theme-bg-color, #1a1d24);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #2a2d36);
    --text: var(--tg-theme-text-color, #ffffff);
    --text-muted: var(--tg-theme-hint-color, #8d9099);
    --accent: var(--tg-theme-button-color, #f7b500);
    --accent-text: var(--tg-theme-button-text-color, #000000);
    --link: var(--tg-theme-link-color, #6ab2f2);
    --border: rgba(255,255,255,0.08);
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    color: #000;
    text-align: center;
  }
  .header-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header-sub { font-size: 13px; opacity: 0.85; }

  /* Sections */
  .section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* Cards */
  .card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .card-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .card-sub { color: var(--text-muted); font-size: 13px; }

  /* Stages */
  .stage {
    display: flex;
    align-items: flex-start;
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: 10px;
    margin-bottom: 8px;
    gap: 12px;
  }
  .stage-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .stage-icon.done { background: rgba(16,185,129,0.2); }
  .stage-icon.current { background: rgba(247,181,0,0.25); animation: pulse 2s ease-in-out infinite; }
  .stage-icon.pending { background: rgba(141,144,153,0.15); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(247,181,0,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(247,181,0,0); }
  }
  .stage-content { flex: 1; }
  .stage-route { font-weight: 600; font-size: 15px; }
  .stage-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .stage-done-time { color: var(--green); font-size: 11px; margin-top: 4px; }

  /* Action grid */
  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px;
  }
  .action-btn {
    background: var(--bg-secondary);
    border: none;
    color: var(--text);
    padding: 16px 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s;
    font-family: inherit;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-icon { font-size: 28px; }
  .action-label { font-weight: 600; }

  /* Advance status */
  .advance-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .advance-stat {
    padding: 10px 8px;
    background: var(--bg-secondary);
    border-radius: 8px;
    text-align: center;
  }
  .advance-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
  .advance-stat-value { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .advance-stat-value.green { color: var(--green); }
  .advance-stat-value.red { color: var(--red); }
  .advance-stat-value.accent { color: var(--accent); }

  /* Forms / Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: flex-end;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg);
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  /* Form */
  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
  }
  .field-textarea { min-height: 80px; resize: vertical; }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Buttons */
  .btn {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:active { opacity: 0.85; }
  .btn.secondary {
    background: var(--bg-secondary);
    color: var(--text);
  }
  .btn.danger {
    background: var(--red);
    color: #fff;
  }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  /* Category select */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .cat-item {
    background: var(--bg-secondary);
    border: 2px solid transparent;
    padding: 12px 6px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cat-item.active {
    border-color: var(--accent);
    background: rgba(247,181,0,0.15);
  }
  .cat-icon { font-size: 22px; }
  .cat-label { font-size: 11px; margin-top: 4px; font-weight: 600; }

  /* Диспетчер */
  .disp-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .disp-refresh {
    background: var(--bg-secondary); border: none; color: var(--text);
    width: 38px; height: 38px; border-radius: 10px; font-size: 16px; cursor: pointer;
  }
  .disp-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    padding: 14px 16px;
  }
  .disp-stat {
    background: var(--bg-secondary); border-radius: 10px; padding: 10px 6px; text-align: center;
  }
  .disp-stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
  .disp-stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .disp-tabs {
    display: flex; gap: 8px; padding: 4px 16px 14px;
  }
  .disp-tab {
    flex: 1; background: var(--bg-secondary); border: 2px solid transparent;
    padding: 10px 6px; border-radius: 10px; font-size: 13px; font-weight: 600;
    color: var(--text); cursor: pointer;
  }
  .disp-tab.active { border-color: var(--accent); background: rgba(247,181,0,0.15); }
  .disp-call {
    font-size: 12px; color: #3b82f6; text-decoration: none; font-weight: 600;
    background: rgba(59,130,246,0.12); padding: 5px 10px; border-radius: 8px;
  }

  /* Валюты */
  .currency-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .currency-btn {
    background: var(--bg-secondary);
    border: 2px solid transparent;
    padding: 10px 4px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    transition: all 0.1s;
  }
  .currency-btn.active {
    border-color: var(--accent);
    background: rgba(247,181,0,0.15);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 14px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }

  /* Photo upload */
  .photo-preview {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .photo-item {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    border: 1px solid var(--border);
    position: relative;
  }
  .photo-remove {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--red);
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    border: none;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }

  /* SOS button */
  .sos-btn {
    background: linear-gradient(135deg, var(--red), #b91c1c);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    width: 100%;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    font-family: inherit;
  }

  /* Status bar */
  .driver-bar {
    background: var(--bg-secondary);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .driver-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
  }
  .driver-info { flex: 1; min-width: 0; }
  .driver-name { font-weight: 600; font-size: 14px; }
  .driver-trip { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Загрузка...</div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
// КОНФИГ
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxcN4IqXGKehe9ecWBYBJm1T8sUbfEWp4RhYSo92FnUeadmJlrOpFn0-t6i91SFRXw/exec';

// ============================================================
// TELEGRAM INIT
// ============================================================
const tg = window.Telegram?.WebApp;
let tgUser = null;
let driverData = null;
let currentTrip = null;
let advanceCategories = [];
let currencyRates = { UZS: 1 };
let isDispatcher = false;
let dispatcherData = null;
let dispatcherTab = 'trips';

if (tg) {
  tg.expand();
  tg.ready();
  tgUser = tg.initDataUnsafe?.user;

  // Тёмная тема Telegram
  tg.setHeaderColor('#1a1d24');
  tg.setBackgroundColor('#1a1d24');
}

// ============================================================
// API
// ============================================================
async function api(action, data = {}) {
  if (!API_URL) {
    showToast('API не настроен. Скажите администратору.', 'error');
    return { ok: false };
  }
  try {
    // Если есть base64 (фото) — отправляем через POST, иначе GET
    const hasLargeData = data.base64 && data.base64.length > 1000;

    if (hasLargeData) {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...data })
      });
      const text = await resp.text();
      return JSON.parse(text);
    } else {
      const params = new URLSearchParams({ action, ...data });
      const resp = await fetch(`${API_URL}?${params}`);
      const text = await resp.text();
      return JSON.parse(text);
    }
  } catch (e) {
    showToast('Ошибка связи: ' + e.message, 'error');
    return { ok: false, error: e.message };
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
}

function formatMoney(amount) {
  return '$' + Math.round(amount).toLocaleString('ru-RU');
}

// Форматирует сумму в указанной валюте
function formatCurrency(amount, currency) {
  const symbols = { USD: '$', UZS: 'сум', RUB: '₽', KZT: '₸', BYN: 'Br' };
  const sym = symbols[currency] || currency || '';
  const num = Math.round(amount).toLocaleString('ru-RU');
  if (currency === 'USD') return '$' + num;
  return num + ' ' + sym;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ru-RU');
}

function formatDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  if (!tgUser) {
    showError('Это приложение работает только внутри Telegram. Откройте через бота @Driver_Parnas');
    return;
  }

  // Сначала проверяем — не диспетчер ли это
  const dispResp = await api('getDispatcherData', { telegramId: tgUser.id });
  if (dispResp.ok && dispResp.isDispatcher) {
    isDispatcher = true;
    dispatcherData = dispResp;
    renderDispatcher();
    return;
  }

  // Иначе — водитель
  const resp = await api('getDriverByTelegram', { telegramId: tgUser.id });

  if (!resp.ok) {
    showError('Не удалось получить данные. Возможно, вы ещё не зарегистрированы. Отправьте /start боту @Driver_Parnas');
    return;
  }

  driverData = resp.driver;
  currentTrip = resp.currentTrip;
  advanceCategories = resp.advanceCategories || [];
  currencyRates = resp.rates || { UZS: 1 };

  render();
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-text">${escapeHtml(msg)}</div>
    </div>
  `;
}

// ============================================================
// ЭКРАН ДИСПЕТЧЕРА
// ============================================================
function renderDispatcher() {
  const d = dispatcherData;
  const app = document.getElementById('app');

  const tabsHtml = `
    <div class="disp-tabs">
      <button class="disp-tab ${dispatcherTab==='trips'?'active':''}" onclick="switchDispTab('trips')">🚛 Рейсы (${d.totalActive})</button>
      <button class="disp-tab ${dispatcherTab==='free'?'active':''}" onclick="switchDispTab('free')">🆓 Свободные (${d.freeTrucks.length})</button>
    </div>`;

  let content = '';

  if (dispatcherTab === 'trips') {
    if (!d.trips.length) {
      content = '<div class="empty" style="padding:40px 20px;"><div class="empty-icon">🚛</div><div class="empty-text">Нет активных рейсов</div></div>';
    } else {
      content = d.trips.map(t => {
        const isDelayed = t.status === 'Задержан';
        const statusColor = isDelayed ? '#ef4444' : '#22c55e';
        const advColor = t.advanceLeft < 0 ? '#ef4444' : (t.advanceLeft < 50 ? '#f59e0b' : '#22c55e');
        const progress = t.stagesCount ? Math.round(t.arrivedCount / t.stagesCount * 100) : 0;
        return `
          <div class="card" style="margin-bottom:10px; border-left:3px solid ${statusColor};">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
              <div style="flex:1; min-width:0;">
                <div style="font-weight:700; font-size:15px;">${escapeHtml(t.number||'')}</div>
                <div style="font-size:13px; color:var(--text-muted); margin-top:2px;">${escapeHtml(t.route || 'маршрут не указан')}</div>
              </div>
              <span style="font-size:11px; color:${statusColor}; font-weight:600; white-space:nowrap;">${isDelayed?'🔴':'🟢'} ${escapeHtml(t.status)}</span>
            </div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:8px; line-height:1.7;">
              👤 ${escapeHtml(t.driverName || '—')}<br>
              🚛 ${escapeHtml(t.truckPlate || '—')} · ⏱️ ${t.days} дн. в пути
              ${t.cargo ? '<br>📦 ' + escapeHtml(t.cargo) : ''}
              ${t.lastLoc ? '<br>📍 был в: ' + escapeHtml(t.lastLoc) : ''}
            </div>
            ${t.stagesCount > 1 ? `
              <div style="margin-top:8px;">
                <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">Этапы: ${t.arrivedCount} из ${t.stagesCount}</div>
                <div style="height:5px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;">
                  <div style="height:100%; width:${progress}%; background:${statusColor};"></div>
                </div>
              </div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.06);">
              <div style="font-size:12px;">
                <span style="color:var(--text-muted);">Аванс:</span>
                <strong style="color:${advColor};"> $${Math.round(t.advanceLeft).toLocaleString('ru-RU')}</strong>
                <span style="color:var(--text-muted); font-size:11px;"> из $${Math.round(t.advanceGiven).toLocaleString('ru-RU')}</span>
              </div>
              ${t.driverPhone ? `<a href="tel:${escapeHtml(t.driverPhone)}" class="disp-call">📞 Позвонить</a>` : ''}
            </div>
          </div>`;
      }).join('');
    }
  } else {
    if (!d.freeTrucks.length) {
      content = '<div class="empty" style="padding:40px 20px;"><div class="empty-icon">✅</div><div class="empty-text">Все фуры в работе</div></div>';
    } else {
      content = `<div style="font-size:13px; color:var(--text-muted); margin-bottom:10px;">Эти машины простаивают — можно дать заказ:</div>` +
        d.freeTrucks.map(tr => `
          <div class="card" style="margin-bottom:8px; display:flex; align-items:center; gap:12px;">
            <span style="font-size:20px;">🚛</span>
            <div>
              <div style="font-weight:600; font-size:14px;">${escapeHtml(tr.plate)}</div>
              ${tr.model ? `<div style="font-size:12px; color:var(--text-muted);">${escapeHtml(tr.model)}</div>` : ''}
            </div>
          </div>`).join('');
    }
  }

  app.innerHTML = `
    <div class="disp-header">
      <div>
        <div style="font-size:12px; color:var(--text-muted);">Диспетчер</div>
        <div style="font-size:17px; font-weight:700;">${escapeHtml(d.dispatcherName)}</div>
      </div>
      <button class="disp-refresh" onclick="refreshDispatcher()">🔄</button>
    </div>
    <div class="disp-stats">
      <div class="disp-stat"><div class="disp-stat-val">${d.totalActive}</div><div class="disp-stat-lbl">в пути</div></div>
      <div class="disp-stat"><div class="disp-stat-val" style="color:#ef4444;">${d.totalDelayed}</div><div class="disp-stat-lbl">задержаны</div></div>
      <div class="disp-stat"><div class="disp-stat-val" style="color:#22c55e;">${d.freeTrucks.length}</div><div class="disp-stat-lbl">свободны</div></div>
    </div>
    ${tabsHtml}
    <div style="padding:0 16px 20px;">${content}</div>`;
}

function switchDispTab(tab) {
  dispatcherTab = tab;
  renderDispatcher();
}

async function refreshDispatcher() {
  const resp = await api('getDispatcherData', { telegramId: tgUser.id });
  if (resp.ok) {
    dispatcherData = resp;
    renderDispatcher();
    showToast('✅ Обновлено', 'success');
  } else {

// История действий на рейсе
function renderHistory(history) {
  if (!Array.isArray(history) || !history.length) return '';

  const icons = { fuel: '⛽', expense: '💸', arrival: '✅' };

  const items = history.slice(0, 15).map(h => {

    let usdStr = '';
    if (h.amount > 0) {
      amountStr = formatCurrency(h.amount, h.currency || 'UZS');
      if (h.currency && h.currency !== 'USD' && h.amountUsd) {

      }
    }
    const timeStr = h.date ? relativeTime(h.date) : '';
    return `
      <div style="display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);">

        </div>
        <div style="text-align:right; white-space:nowrap;">

          ${usdStr ? `<div style="font-size:11px; color:var(--text-muted);">${usdStr}</div>` : ''}
          <div style="font-size:11px; color:var(--text-muted);">${timeStr}</div>

    <div class="section">
      <div class="section-title">📋 История действий</div>
      <div class="card" style="padding:4px 16px;">
        ${items}
      </div>
    </div>
  `;
}

// Относительное время: "2 часа назад", "вчера", "3 дня назад"
function relativeTime(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMs / 3600000);
  const diffDay = Math.floor(diffMs / 86400000);

  if (diffMin < 1) return 'только что';
  if (diffMin < 60) return diffMin + ' мин назад';
  if (diffHour < 24) return diffHour + ' ч назад';
  if (diffDay === 1) return 'вчера';
  if (diffDay < 7) return diffDay + ' дн назад';
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
}

function renderStage(s, i, allStages) {
  let status = 'pending';
  let icon = (i + 1).toString();
  let timeInfo = '';

  if (s.arrivedAt) {
    status = 'done';
    icon = '✓';
    timeInfo = `<div class="stage-done-time">✅ Прибыл ${formatDateTime(s.arrivedAt)}</div>`;
  } else {
    // Текущий = первый без arrivedAt
    const firstPending = allStages.findIndex(x => !x.arrivedAt);
    if (i === firstPending) {
      status = 'current';
      icon = '→';
    }
  }

  return `
    <div class="stage">
      <div class="stage-icon ${status}">${icon}</div>
      <div class="stage-content">
        <div class="stage-route">${escapeHtml(s.route || 'Маршрут не указан')}</div>
        <div class="stage-meta">
          ${s.cargo ? '📦 ' + escapeHtml(s.cargo) : ''}
          ${s.distance ? ' • ' + s.distance + ' км' : ''}
        </div>
        ${timeInfo}
      </div>
    </div>
  `;
}

async function submitPhoto() {

  }
}

// Сжимает изображение и возвращает base64 (без префикса)
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        // Уменьшаем пропорционально
        if (width > height) {
          if (width > maxSize) { height = height * maxSize / width; width = maxSize; }
        } else {
          if (height > maxSize) { width = width * maxSize / height; height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl.split(',')[1]);
      };
      img.onerror = () => reject(new Error('Не удалось прочитать изображение'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Не удалось прочитать файл'));
    reader.readAsDataURL(file);
  });
}

function openCurrencyModal() {
  const rates = currencyRates || { UZS: 1 };

  const order = ['USD', 'RUB', 'KZT', 'BYN'];

      <span>${info.flag} 1 ${info.name}</span>

    </div>`;
  }).join('');

  const curOptions = Object.keys(CURRENCY_INFO).map(c =>
    `<option value="${c}">${CURRENCY_INFO[c].flag} ${CURRENCY_INFO[c].name}</option>`
  ).join('');

  showModal(`
    <div class="modal-title">💱 Обмен валют</div>
    <div class="field">
      <label class="field-label">Текущие курсы (к суму)</label>

    </div>
    <div class="field">
      <label class="field-label">Калькулятор</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <input class="field-input" id="conv-amount" type="number" inputmode="decimal" placeholder="100" style="flex:1;" oninput="doConvert()">
        <select class="field-input" id="conv-from" style="flex:1;" onchange="doConvert()">${curOptions}</select>
      </div>
      <div style="text-align:center; font-size:20px; margin:8px 0; color:var(--text-muted);">↓</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <input class="field-input" id="conv-result" type="text" readonly style="flex:1; font-weight:700; color:var(--accent);">
        <select class="field-input" id="conv-to" style="flex:1;" onchange="doConvert()">${curOptions}</select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Закрыть</button>
    </div>
  `);
  // Значения по умолчанию: из USD в UZS
  const fromSel = document.getElementById('conv-from');
  const toSel = document.getElementById('conv-to');
  if (fromSel) fromSel.value = 'USD';
  if (toSel) toSel.value = 'UZS';
  doConvert();
}

function doConvert() {
  const rates = currencyRates || { UZS: 1 };
  const amount = parseFloat(document.getElementById('conv-amount').value) || 0;
  const from = document.getElementById('conv-from').value;
  const to = document.getElementById('conv-to').value;
  const resultEl = document.getElementById('conv-result');
  if (!resultEl) return;
  // Переводим из валюты в сумы, потом в целевую валюту
  const fromRate = (from === 'UZS') ? 1 : (rates[from] || 0);
  const toRate = (to === 'UZS') ? 1 : (rates[to] || 0);
  if (!fromRate || !toRate) { resultEl.value = 'курс недоступен'; return; }
  const inUzs = amount * fromRate;
  const result = inUzs / toRate;
  resultEl.value = result.toLocaleString('ru-RU', { maximumFractionDigits: 2 });
}

  const tripCards = trips.map(t => {
    const sColor = statusColors[t.status] || 'var(--text-muted)';
    const expenseList = t.expenses.length ? t.expenses.map(e => `
      <div style="display:flex; justify-content:space-between; font-size:12px; padding:4px 0; color:var(--text-muted);">
        <span>${escapeHtml(e.label)}</span>
        <span>${formatCurrency(e.amount, e.currency)}${e.currency !== 'USD' ? ' ≈ $' + Math.round(e.amountUsd) : ''}</span>
      </div>
    `).join('') : '<div style="font-size:12px; color:var(--text-muted); padding:4px 0;">Расходов нет</div>';

    return `
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong style="font-size:15px;">${escapeHtml(t.number || '—')}</strong>
          <span style="font-size:11px; color:${sColor}; font-weight:600;">${escapeHtml(t.status || '')}</span>
        </div>
        <div style="font-size:13px; margin:4px 0;">${escapeHtml(t.route || 'Маршрут не указан')}</div>
        <div style="font-size:11px; color:var(--text-muted);">${t.date ? formatDate(t.date) : ''} · ${escapeHtml(t.truckPlate || '')}</div>
        <div style="border-top:1px solid rgba(255,255,255,0.06); margin-top:8px; padding-top:8px;">
          ${expenseList}
          <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.06);">
            <span>Всего потрачено:</span>
            <span style="color:var(--accent);">$${Math.round(t.spentUsd).toLocaleString('ru-RU')}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  showModal(`
    <div class="modal-title">📖 Мои рейсы (${trips.length})</div>
    <div style="max-height:60vh; overflow-y:auto;">${tripCards}</div>
    <div class="btn-row"><button class="btn" onclick="closeModal()">Закрыть</button></div>
  `);
}

function sendSOS() {
  const msg = prompt('Опишите проблему кратко:');
  if (!msg) return;

  api('sendSOS', {
    tripId: currentTrip.id,
    driverId: driverData.id,
    message: msg,
    date: new Date().toISOString()
  }).then(resp => {
    if (resp.ok) {
      showToast('🆘 Сообщение отправлено диспетчеру', 'success');
    } else {
      showToast('Ошибка отправки SOS', 'error');
    }
  });
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html) {
  let overlay = document.getElementById('modal-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.classList.add('active');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.classList.remove('active');
}

// ============================================================
// REFRESH
// ============================================================
async function refreshApp() {
  document.getElementById('app').innerHTML = `
    <div class="loading"><div class="spinner"></div><div>Обновляем...</div></div>
  `;
  await init();
}

// ============================================================
// START
// ============================================================
init();
</script>
